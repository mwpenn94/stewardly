    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Stewardly",
      "description": "Stewardship platform integrating wealth, behavior, household, and stakeholder engines for individuals, professionals, managers, organizations, and platforms.",
      "applicationCategory": "Productivity",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "AI-powered web research",
        "Parallel wide research",
        "Code execution and generation",
        "Document generation",
        "Image generation",
        "Voice transcription",
        "Cross-session memory",
        "Task sharing and collaboration",
        "Scheduled task automation",
        "Task replay with timeline",
        "Data analysis and visualization",
        "Keyboard shortcuts"
      ]
    }
    </script>
    <script>
      // Apply dark class before first paint to prevent FOUC and contrast checker false positives
      (function() {
        var stored = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        // Default to dark when no preference is stored (matches ThemeProvider defaultTheme="dark")
        if (stored === 'dark' || stored === 'system' && prefersDark || (!stored && true)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>
